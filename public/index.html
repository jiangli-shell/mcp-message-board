<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>留言板 - MCP Message Board</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; color: white; margin-bottom: 30px; }
    .new-message, .messages {
      background: white;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }
    .new-message h2, .messages h2 { margin-bottom: 16px; color: #333; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
    }
    .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #667eea; }
    .form-group textarea { min-height: 100px; resize: vertical; }
    .btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4); }
    .message { border-bottom: 1px solid #eee; padding: 20px 0; }
    .message:last-child { border-bottom: none; }
    .message-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .message-author { font-weight: 600; color: #667eea; font-size: 16px; }
    .message-time { color: #999; font-size: 14px; }
    .message-content { color: #333; line-height: 1.6; margin-bottom: 12px; }
    .message-id { font-size: 12px; color: #ccc; font-family: monospace; }
    .replies { margin-left: 24px; margin-top: 16px; padding-left: 16px; border-left: 3px solid #667eea; }
    .replies-title { font-size: 14px; color: #666; margin-bottom: 12px; }
    .reply { background: #f8f9fa; border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; }
    .reply-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .reply-author { font-weight: 500; color: #764ba2; font-size: 14px; }
    .reply-time { color: #999; font-size: 12px; }
    .reply-content { color: #555; font-size: 14px; }
    .reply-form { margin-top: 12px; display: none; }
    .reply-form.active { display: block; }
    .reply-form input { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; margin-bottom: 8px; }
    .reply-form textarea { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; min-height: 60px; margin-bottom: 8px; }
    .btn-small { padding: 6px 16px; font-size: 14px; }
    .btn-link { background: none; border: none; color: #667eea; cursor: pointer; font-size: 14px; padding: 0; margin-right: 12px; }
    .empty-state { text-align: center; padding: 40px; color: #999; }
    .loading { text-align: center; padding: 40px; color: #667eea; }
    .error { background: #fee; color: #c00; padding: 12px; border-radius: 8px; margin-bottom: 16px; }
    .success { background: #efe; color: #060; padding: 12px; border-radius: 8px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>💬 留言板</h1>
    <div class="new-message">
      <h2>发表新留言</h2>
      <div id="message-alert"></div>
      <form id="new-message-form">
        <div class="form-group">
          <label for="author">昵称</label>
          <input type="text" id="author" placeholder="请输入你的昵称" required>
        </div>
        <div class="form-group">
          <label for="content">留言内容</label>
          <textarea id="content" placeholder="写下你想说的话..." required></textarea>
        </div>
        <button type="submit" class="btn">发表留言</button>
      </form>
    </div>
    <div class="messages">
      <h2>所有留言</h2>
      <div id="messages-container"><div class="loading">加载中...</div></div>
    </div>
  </div>
  <script>
    const API_BASE = window.location.origin;
    function showAlert(containerId, message, type) {
      const container = document.getElementById(containerId);
      container.innerHTML = `<div class="${type}">${message}</div>`;
      setTimeout(() => { container.innerHTML = ''; }, 3000);
    }
    function formatTime(isoString) {
      return new Date(isoString).toLocaleString('zh-CN', {
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      });
    }
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    function renderMessages(messages) {
      const container = document.getElementById('messages-container');
      if (messages.length === 0) {
        container.innerHTML = '<div class="empty-state">暂无留言，来发表第一条吧！</div>';
        return;
      }
      container.innerHTML = messages.map(msg => `
        <div class="message" data-id="${msg.id}">
          <div class="message-header">
            <span class="message-author">${escapeHtml(msg.author)}</span>
            <span class="message-time">${formatTime(msg.timestamp)}</span>
          </div>
          <div class="message-content">${escapeHtml(msg.content)}</div>
          <div class="message-id">ID: ${msg.id}</div>
          ${msg.replies && msg.replies.length > 0 ? `
            <div class="replies">
              <div class="replies-title">回复 (${msg.replies.length})</div>
              ${msg.replies.map(reply => `
                <div class="reply">
                  <div class="reply-header">
                    <span class="reply-author">${escapeHtml(reply.author)}</span>
                    <span class="reply-time">${formatTime(reply.timestamp)}</span>
                  </div>
                  <div class="reply-content">${escapeHtml(reply.content)}</div>
                </div>
              `).join('')}
            </div>
          ` : ''}
          <div style="margin-top: 12px;">
            <button class="btn-link" onclick="toggleReplyForm('${msg.id}')">回复</button>
          </div>
          <div class="reply-form" id="reply-form-${msg.id}">
            <input type="text" id="reply-author-${msg.id}" placeholder="你的昵称" required>
            <textarea id="reply-content-${msg.id}" placeholder="写下你的回复..." required></textarea>
            <button class="btn btn-small" onclick="submitReply('${msg.id}')">发送回复</button>
          </div>
        </div>
      `).join('');
    }
    async function loadMessages() {
      try {
        const response = await fetch(`${API_BASE}/api/messages`);
        const messages = await response.json();
        renderMessages(messages);
      } catch (error) {
        document.getElementById('messages-container').innerHTML = '<div class="error">加载留言失败，请刷新页面重试</div>';
      }
    }
    async function submitMessage(event) {
      event.preventDefault();
      const author = document.getElementById('author').value.trim();
      const content = document.getElementById('content').value.trim();
      if (!author || !content) { showAlert('message-alert', '请填写昵称和留言内容', 'error'); return; }
      try {
        const response = await fetch(`${API_BASE}/api/messages`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ author, content })
        });
        if (response.ok) {
          document.getElementById('content').value = '';
          showAlert('message-alert', '留言发表成功！', 'success');
          loadMessages();
        } else { showAlert('message-alert', '留言发表失败，请重试', 'error'); }
      } catch (error) { showAlert('message-alert', '发表留言失败，请重试', 'error'); }
    }
    function toggleReplyForm(messageId) {
      document.getElementById(`reply-form-${messageId}`).classList.toggle('active');
    }
    async function submitReply(messageId) {
      const author = document.getElementById(`reply-author-${messageId}`).value.trim();
      const content = document.getElementById(`reply-content-${messageId}`).value.trim();
      if (!author || !content) { alert('请填写昵称和回复内容'); return; }
      try {
        const response = await fetch(`${API_BASE}/api/messages/${messageId}/replies`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ author, content })
        });
        if (response.ok) loadMessages();
        else alert('回复失败，请重试');
      } catch (error) { alert('回复失败，请重试'); }
    }
    document.getElementById('new-message-form').addEventListener('submit', submitMessage);
    loadMessages();
    setInterval(loadMessages, 30000);
  </script>
</body>
</html>
